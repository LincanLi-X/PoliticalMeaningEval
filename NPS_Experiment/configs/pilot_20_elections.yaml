dataset:
  mode: sample_40_per_domain
  merged_path: NPS_exp/data/merged_nps_news_seeds.jsonl
  sampled_path: NPS_exp/data/nps_200_sampled_seeds.jsonl
  source_files:
    - nps_elections_verified_news_seeds_2024_2026_v2.jsonl
    - nps_immigration_verified_news_seeds_2024_2026.jsonl
    - nps_public_safety_verified_news_seeds_2024_2026.jsonl
    - nps_international_conflict_verified_news_seeds_2024_2026.jsonl
    - nps_institutional_trust_verified_news_seeds_2024_2026.jsonl
  n_per_domain: 40
  random_seed: 42

community:
  agents_per_role: 5
  topology: polarized_clusters
  memory_size: 5
  network_seed: 42

simulation:
  num_rounds: 10
  checkpoint_rounds: [1, 3, 5, 8, 10]
  verifier_intervention_rounds: [3, 6, 9]
  messages_per_round_per_agent: 1
  initial_receiver_roles: ["ordinary_observer", "political_commentator"]
  initial_receivers_per_role: 2
  max_context_messages: 4
  max_concurrent_agent_calls: 10

models:
  mode: mock
  generation_model: gpt-5-mini-2025-08-07
  evaluation_model: gpt-5-mini-2025-08-07
  request_timeout_seconds: 60
  max_retries: 2
  max_output_tokens:
    generation: 512
    evaluation: 2000
  temperature:
    partisan_amplifier: 0.9
    political_commentator: 0.7
    institutional_verifier: 0.2
    ordinary_observer: 0.8
    evaluator: 0.1

outputs:
  trajectories_dir: NPS_exp/outputs/pilot_20_elections/trajectories
  metrics_dir: NPS_exp/outputs/pilot_20_elections/metrics
  summaries_dir: NPS_exp/outputs/pilot_20_elections/summaries

logging:
  agent_progress: true

metrics:
  allow_heuristic_fallback: false
